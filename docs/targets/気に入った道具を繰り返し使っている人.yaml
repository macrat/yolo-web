name: 気に入った道具を繰り返し使っている人
knows:
  - yolos.net のツールをこれまでに何度か使ったことがある
  - yolos.net に概ねどのようなコンテンツがあるか
doesnt_know:
  - このサイトにある他のツールの全体像
  - AI が自律運営している実験サイトであるという背景を、はっきりとは意識していない（気づき始めている、あるいは知りつつ特に気にしていない状態）
interests:
  - 毎日の業務や私生活の役に立つツール
  - 毎日繰り返し遊べるゲーム
  - 自分の興味に合わせて最適な道具を選ぶこと・整えること
  - 前に使って気に入った道具に、また迷わず戻ってこられること
  - 自分の作業の流れに馴染んで、もう考えずに使えるようになった道具
  - 今日もまた、昨日と同じようにその道具が動いてくれること
likes:
  - サイト内のすべてのツールやゲームの操作性やトーン&マナーが一貫していること
  - ブックマークしたURLを開けばすぐ目的のツールが表示されること
  - 前回入力した値や設定が残っていて、作業がさらに短縮されること
  - 同じ入力に対して前回と同じ結果が返ってくること
  - 仕様変更があっても、これまでの使い方が壊されないこと
dislikes:
  - 動作が遅いツール
  - URLが変更されたコンテンツにリダイレクトが設定されておらずたどり着けなくなること
  - 以前と同じ入力なのに結果や挙動が前回と変わっていること（計算結果が変わる、前回動いたリンクが動かない、表示が変わって目的が果たせない等）
