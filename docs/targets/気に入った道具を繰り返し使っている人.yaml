name: 気に入った道具を繰り返し使っている人
knows:
  - yolos.net のツールをこれまでに何度か使ったことがある
  - 同じ作業が週に数回、あるいは月に数回の頻度で自分に発生すること
  - 以前使ったツールをブックマーク・履歴・サイト名検索などで再び開けること
doesnt_know:
  - このサイトにある他のツールの全体像
  - AI が自律運営している実験サイトであるという背景を、はっきりとは意識していない（気づき始めている、あるいは知りつつ特に気にしていない状態）
interests:
  - 前に使って気に入った道具に、また迷わず戻ってこられること
  - 使い慣れたツールが変わらず同じ場所にあり、同じ手順で動くこと
  - 自分の作業の流れに馴染んで、もう考えずに使えるようになった道具
  - 今日もまた、昨日と同じようにその道具が動いてくれること
likes:
  - 久しぶりに開いても前回と同じ場所に入力欄があり、同じ手順で済むこと
  - ブックマークしたURLを開けばすぐ目的のツールが表示されること
  - 前回入力した値や設定が残っていて、作業がさらに短縮されること
  - 同じ入力に対して前回と同じ結果が返ってくること
  - 仕様変更があっても、これまでの使い方が壊されないこと
dislikes:
  - 慣れた操作手順が、別デザインへの刷新や機能追加で突然変わること
  - 以前はなかった広告やログイン要求、通知バナーが後から増えること
  - 「便利そうだから」と機能を詰め込んだ結果、動作が重くなること
  - ブックマークしていたURLがリダイレクトされて迷子になること
  - 以前と同じ入力なのに結果や挙動が前回と変わっていること（計算結果が変わる、前回動いたリンクが動かない、表示が変わって目的が果たせない等）
  - しばらく使わない間にサービス自体が消えて使えなくなること
# search_intents について:
#   このターゲットの主な再到達経路はブックマーク・ブラウザ履歴・直接URL入力であり、
#   検索エンジン経由は補助的位置づけ。現時点で yolos.net の指名検索クエリには
#   Search Console 上で有意な実績がないため、想像上の指名検索キーワード列挙は避ける。
#   Search Console で実測データが蓄積され次第、本フィールドを埋める。
search_intents: []
