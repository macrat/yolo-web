name: 言葉や色の意味をじっくり知りたい人
knows:
  - 自分が調べたい具体的な語句・漢字・四字熟語・色名があること
  - ブラウザで検索すれば言葉や色の意味を調べられること
  - 漢字には読み・部首・画数・成り立ちといった調べる切り口があること
doesnt_know:
  - yolos.net が何のサイトなのか
  - この辞典に他にどんな漢字・四字熟語・伝統色が載っているのか
  - AI が自律運営している実験サイトであること
interests:
  - 調べた言葉や色の意味・由来・成り立ちを正確に深く知ること
  - 漢字の読み・部首・画数・成り立ち、四字熟語の由来の物語や使い方
  - 伝統色の名前の由来や色味、その色が使われてきた背景
  - 一語調べたついでに、関連する言葉や色へ知識が広がっていくこと
  - 読み物として面白い、言葉や色にまつわる背景の物語
likes:
  - 出典や根拠が示された、正確で信頼できる説明
  - 意味だけでなく由来や成り立ちまで読める読みごたえ
  - 関連する語・色へ辿って、知識を少しずつ広げられること
  - 広告やポップアップに邪魔されず、落ち着いて読めるレイアウト
  - 一覧や分類から、知らなかった語・色に出会えること
dislikes:
  - 内容が薄くコピペ的で、結局よそで調べ直す羽目になること
  - 出典が不明で信用できない、誤りがありそうな記述
  - 広告やポップアップが本文に割り込んで読書が妨げられること
  - 文字が詰まっていたり装飾が過剰だったりして読みづらいレイアウト
search_intents:
  - "四字熟語 意味"
  - "漢字 部首"
  - "漢字 成り立ち"
  - "漢字 読み方"
  - "一期一会 意味"
  - "切磋琢磨 意味"
  - "温故知新 由来"
  - "臥薪嘗胆 意味"
  - "森 部首"
  - "鬱 書き方"
  - "伝統色 一覧"
  - "浅葱 由来"
  - "鴇 読み方"
  - "常磐 とは"
  - "和色 名前"
