name: 手軽で面白い占い・診断を楽しみたい人
knows:
  - 特別な前提知識は不要
  - SNS（X、Instagram Stories、LINE等）の基本的な使い方
  - MBTIや16Personalitiesなどの性格タイプ診断（特にZ世代）
  - 自分や友人のMBTIタイプ（Z世代の60%以上が友人のタイプを把握）
doesnt_know:
  - yolos.net が何なのか
  - yolos.net でどんな遊びができるのか
interests:
  - 占い・診断で自分の意外な一面を発見すること
  - 面白くて思わず笑ってしまう占いや診断
  - 友達との会話のネタになるコンテンツ
  - 1〜2分以内で手軽に遊べるコンテンツ（隙間時間・移動時間に完結できる）
  - 診断結果を友達と比較して盛り上がること
  - MBTIや性格タイプを友人関係の「共通言語」として使うこと
  - 自分の潜在的な一面や隠れた性格を知ること
  - 恋愛タイプや相性診断（特に20〜30代女性）
likes:
  - 登録やインストールなしですぐ遊べること
  - ユーモアがあって意外性のある診断結果
  - 「くすっと笑える」「友達に見せたくなる」切り口
  - スマホブラウザだけで完結する手軽さ
  - 結果をSNSでシェアしやすい仕組み（X優先）
  - 「ポジティブな褒め言葉」か「笑える自虐」の結果テキスト
  - 「自分だけに当てはまる」という感覚（バーナム効果）を楽しむ
  - かわいい・おしゃれ・面白いビジュアル付きの結果画面
  - 5問前後の質問数（最も気持ちよく答えられる）
  - プログレスバーで残り問数が分かること
  - 診断前に所要時間・問題数・結果の種類数が分かること
  - 他者との比較・相性確認ができること
dislikes:
  - ガチすぎるスピリチュアル系の占い
  - こじつけで納得できない答えや判定
  - 遊ぶ前に会員登録やアプリのインストールを求められること
  - 操作が重い、説明が足りず迷うUI
  - 長すぎて隙間時間に収まらないコンテンツ（10問以上で完了率が急落）
  - ありきたりで面白みのない診断結果
  - 診断前の長い説明文（特にスマホ画面では読まない）
  - 広告・テキスト過多のページ（強い離脱動機）
  - 結果画像のない「テキストのみ」の結果ページ
  - シェアボタンが小さい・見つけにくい配置
  - 診断の開発者の思想や歴史など、本質と関係ない情報
