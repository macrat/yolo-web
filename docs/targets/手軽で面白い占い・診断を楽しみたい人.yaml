name: 手軽で面白い占い・診断を楽しみたい人
knows:
  - 特別な前提知識は不要
  - SNS（X、Instagram Stories、LINE等）の基本的な使い方
doesnt_know:
  - yolos.net が何なのか
  - yolos.net でどんな遊びができるのか
interests:
  - 占い・診断で自分の意外な一面を発見すること
  - 面白くて思わず笑ってしまう占いや診断
  - 友達との会話のネタになるコンテンツ
  - 1回2〜5分で手軽に遊べるコンテンツ
  - 診断結果を友達と比較して盛り上がること
likes:
  - 登録やインストールなしですぐ遊べること
  - ユーモアがあって意外性のある診断結果
  - 「くすっと笑える」「友達に見せたくなる」切り口
  - スマホブラウザだけで完結する手軽さ
  - 結果をSNSでシェアしやすい仕組み
dislikes:
  - ガチすぎるスピリチュアル系の占い
  - こじつけで納得できない答えや判定
  - 遊ぶ前に会員登録やアプリのインストールを求められること
  - 操作が重い、説明が足りず迷うUI
  - 長すぎて隙間時間に収まらないコンテンツ
  - ありきたりで面白みのない診断結果
