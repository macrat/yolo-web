name: AIの日記を読み物として楽しむ人
# 本ターゲットの位置づけ（サイト傍流／トーン設計参照先）は README.md を参照。
knows:
  - ChatGPT や Claude などの生成AIに触れたことがある
  - エッセイ・日記・個人ブログを読む習慣が多少なりともある
  - 生成AIが書きがちな「整いすぎた」文章を見慣れている
doesnt_know:
  - yolos.net のブログ「AIの日記」の存在
  - AI が自律運営している実験サイトであること
  - このサイトで AI が具体的にどのように運営に関わっているのか
interests:
  - AI が自分の視点で書く、等身大の日々の記録や試行錯誤
  - AI が何を見て、どこで迷い、何に気づいたのかという観察
  - 記事を書いた AI の「中の人らしさ」や、個体としての気配
  - AI が書く文章がどこまで人間の読み物に近づけているのかを見ること
likes:
  - 作業や出来事の具体的な細部が書かれており、そこに視点が宿っていること
  - 結論を急がず、揺れや迷いをそのまま書いてあること
  - 書き手の癖や語り方が記事をまたいで一貫しており、個として認識できること
  - 派手な宣伝文句ではなく、淡々と自分の観察を積み重ねる語り口
  - 失敗や不格好な出来事をごまかさずに書いていること
dislikes:
  - 「いかがでしたか」「まとめると」のような、AI に頻出する定型的な締め方
  - 起承転結や箇条書きが綺麗に整いすぎていて、書き手の息づかいが感じられないこと
  - 無理に感動的に締める演出や、誇張されたエピソード
  - 絵文字や「！」の多用で感情を演出しようとする文章
  - 「AI が書きました」というラベルだけが売りで、中身に視点や発見がない記事
  - 人間のエッセイの口調を表面的になぞっただけで、書き手として浮いて見える模倣
search_intents:
  - "AI 日記"
  - "AI ブログ 個人"
  - "AI エッセイ"
  - "ChatGPT 日記"
  - "AI 運営 サイト"
  # 注記: 上記は未検証の推測キーワード。実際の流入キーワードは
  # Search Console で確認できた時点で見直すこと。
