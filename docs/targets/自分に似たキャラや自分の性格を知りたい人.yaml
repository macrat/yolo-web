name: 自分に似たキャラや自分の性格を知りたい人
knows:
  - ネットには無料で遊べる性格診断やキャラ診断があること
  - MBTI・16タイプ性格診断や、似てるキャラ診断が SNS で流行っていること
  - 友達や周りの人も診断をやっていて、結果を話題にしていること
  - スマホのブラウザで気軽に診断を試せること
  - 検索すれば気になる診断がすぐ見つかること
doesnt_know:
  - yolos.net が何のサイトなのか
  - このサイトに他にどんな診断やコンテンツが並んでいるのか
  - AI が自律運営している実験サイトであること
interests:
  - 自分に似ているキャラは誰なのか、自分はどんな性格なのか、という自分自身への好奇心
  - 相性や運勢など、自分にまつわるちょっとした発見
  - 重い自己分析ではなく、軽く楽しめる発見を求めていること
  - 結果が自己紹介や会話のネタになり、友達と見せ合ったり比べたりして楽しめること
  - 自分を表す印象的なラベル（似てるキャラ・タイプ・四字熟語・色など）を手に入れること
likes:
  - ページを開いてすぐ診断を始められること
  - 設問が多すぎず短時間で終わること（長い本格診断のように途中で疲れない手軽さ）
  - 結果が「当たってる」「自分の新しい一面を見つけた」と感じられる手応えがあること
  - 結果がありきたりでなく、読み物として面白い独自性があること（誰にでも当てはまる薄い結果でない）
  - 結果が自己紹介ラベルになり、画像やカードでそのまま SNS に貼って共有できること
  - スマホで快適に操作できること
dislikes:
  - 結果を見る前に会員登録や SNS 共有を強制されること
  - 設問が長すぎたり、診断が重くて始める気が失せること
  - 結果が薄く、誰にでも当てはまる当たり障りない内容であること
  - 結果の続きや詳細を見るのに課金や登録を求められること
  - 結果を友達に見せたり SNS に貼ったりしづらいこと
  - 広告やポップアップで結果が埋もれてしまうこと
  - スマホで操作しづらい画面
search_intents:
  - "似てるキャラ診断"
  - "自分に似てるキャラクター診断"
  - "あなたに最も近いアニメキャラ診断"
  - "あなたに似てるキャラ"
  - "性格診断 無料"
  - "キャラ診断"
  - "自分の性格 診断"
  - "相性診断"
