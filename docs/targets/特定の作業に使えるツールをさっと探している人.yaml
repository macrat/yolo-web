name: 特定の作業に使えるツールをさっと探している人
knows:
  - 自分がやりたい作業の内容（文字数を数えたい、日付を計算したい、など）
  - ブラウザで検索すれば無料のWebツールが見つかること
  - ブラウザの基本的な操作
doesnt_know:
  - yolos.net が何のサイトなのか
  - このサイトに他にどんなツールが並んでいるのか
  - AI が自律運営している実験サイトであること
interests:
  - 今やっている作業を止めずに、必要な処理だけ片付けること
  - 検索結果から開いてすぐ使える、入力や手順が少ないツール
  - 登録やインストールなしでブラウザだけで完結すること
  - 期限・日付・単位・文字数など、ミスが起きやすい部分を素早く確認すること
likes:
  - ページを開いた瞬間に入力欄が見えて、すぐ使い始められること
  - コピペで結果を受け取って、すぐ元の作業画面に戻れること
  - 余計な説明や装飾がなく、用事だけ静かに片付けられる画面
  - 入力した内容が外部に送られないなど、不安なく使えること
  - 結果の根拠や前提が必要最小限だけ添えられており、信頼して使えること
dislikes:
  - 開いた瞬間に広告やポップアップで目的の入力欄が埋もれていること
  - 使い始めるのに会員登録やアプリのインストールを求められること
  - 仕様や前提が曖昧で、出てきた結果を信用していいのか判断できないこと
  - 似たようなツールが並んでいて、どれを使えばよいか迷わせること
  - ツール冒頭に長い解説記事が挟まっていて、すぐ使えないこと
search_intents:
  - "文字数カウント"
  - "日付計算"
  - "パスワード生成"
  - "全角半角変換"
  - "BMI計算"
  - "カラーコード 変換"
  - "単位変換"
