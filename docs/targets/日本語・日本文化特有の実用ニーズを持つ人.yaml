name: 日本語・日本文化特有の実用ニーズを持つ人
knows:
  - 日本語の基本的な読み書き
  - 自分がやりたい作業の内容（ふりがな付与、旧暦確認、敬語確認等）
  - ブラウザの基本的な操作
doesnt_know:
  - yolos.net が何なのか
  - yolos.net で提供しているサービス
  - ふりがな変換ツールの使い方や特徴
  - 旧暦・干支・六曜・節気の正確な計算方法
  - 適切な敬語表現やビジネス文書の定型表現
interests:
  - テキストに自動でふりがな（ルビ）を付与したい
  - 今日の旧暦・干支・六曜・節気を確認したい
  - 適切な敬語表現をすぐに確認したい
  - ビジネスメールの定型文を素早く作りたい
  - 日本語固有の表現や文化的な意味合いを理解したい
likes:
  - 入力してすぐ結果が出る、シンプルで速いツール
  - プライバシーを守りつつ使えるツール（テキストをサーバーに送信しない等）
  - コピペで作業に戻れるシンプルな出力
  - 日本語の文化的背景や使い方の解説が付いていること
  - インストール不要でブラウザだけで完結すること
dislikes:
  - 入力したテキストが外部サーバーに送られる不安
  - 広告・ポップアップで作業が止まること
  - 専門的な設定が必要で使いこなせないツール
  - 汎用ツールサイトで目的の機能が見つけにくいこと
  - 計算結果の根拠や意味が説明されないこと
search_intents:
  - "ふりがな 変換 自動"
  - "ルビ 付与 ツール"
  - "旧暦 今日"
  - "六曜 今日"
  - "干支 今年"
  - "節気 一覧"
  - "敬語 一覧"
  - "ビジネスメール 例文"
  - "お礼メール 書き方"
