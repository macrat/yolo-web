<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Panel — the core motif</title>
    <link rel="stylesheet" href="../colors_and_type.css?v=8" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: var(--bg-soft);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
      }
      .panel {
        background: #ffffff;
        border: 1px solid var(--border);
        padding: 20px;
        min-height: 140px;
        display: flex;
        flex-direction: column;
      }
      .panel.strong {
        border-color: var(--border-strong);
      }
      .panel h4 {
        margin: 0 0 6px;
        font-size: 14px;
        font-weight: 500;
        white-space: nowrap;
      }
      .stamp {
        margin-top: auto;
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-softer);
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h4>折り紙タイマー</h4>
      <span class="stamp">時間</span>
    </div>
    <div class="panel strong">
      <h4>日替わり占い</h4>
      <span class="stamp">占い</span>
    </div>
    <div class="panel">
      <h4>メモ</h4>
      <span class="stamp">記録</span>
    </div>
  </body>
</html>
