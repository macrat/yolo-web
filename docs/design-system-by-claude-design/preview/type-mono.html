<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Type — Mono</title>
    <link rel="stylesheet" href="../colors_and_type.css?v=8" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: var(--bg-soft);
      }
      .block {
        padding: 16px;
        background: #ffffff;
        border: 1px solid var(--border);
      }
      .label {
        display: block;
        margin-bottom: 12px;
      }
      .mono-spec {
        font-family: var(--font-mono);
        color: var(--fg);
      }
      .row {
        display: flex;
        gap: 24px;
        align-items: baseline;
        padding: 4px 0;
      }
      .lbl {
        font-size: 11px;
        color: var(--fg-softer);
        width: 80px;
      }
    </style>
  </head>
  <body>
    <div class="block">
      <span class="label">Noto Sans Mono — 数値・コード表示専用</span>
      <div class="mono-spec">
        <div class="row">
          <span class="lbl">timer</span
          ><span style="font-size: 32px">00:25:00</span>
        </div>
        <div class="row">
          <span class="lbl">amount</span
          ><span style="font-size: 20px">¥ 2,400</span>
        </div>
        <div class="row">
          <span class="lbl">number</span
          ><span style="font-size: 16px">3.14159</span>
        </div>
        <div class="row">
          <span class="lbl">code</span
          ><span style="font-size: 13px; color: var(--fg-softer)"
            >--font-mono</span
          >
        </div>
      </div>
    </div>
  </body>
</html>
