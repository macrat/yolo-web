<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Type — Body</title>
    <link rel="stylesheet" href="../colors_and_type.css?v=8" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: var(--bg-soft);
        max-width: 700px;
      }
      .row {
        display: flex;
        align-items: baseline;
        gap: 24px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child {
        border-bottom: 0;
      }
      .meta {
        width: 120px;
        flex: none;
      }
      .meta .name {
        font-size: 12px;
        color: var(--fg);
        font-weight: 500;
        white-space: nowrap;
      }
      .meta .spec {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-softer);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="meta">
        <div class="name">Body</div>
        <div class="spec">Sans · 15 · 400 · 1.7</div>
      </div>
      <div style="font-size: 15px; line-height: 1.7; color: var(--fg)">
        時間を入れて、はじめるを押す。終わると通知。
      </div>
    </div>
    <div class="row">
      <div class="meta">
        <div class="name">Body sm</div>
        <div class="spec">Sans · 13 · 400</div>
      </div>
      <div class="body-sm">小さな説明や注釈に使う。色はやや控えめ。</div>
    </div>
    <div class="row">
      <div class="meta">
        <div class="name">Caption</div>
        <div class="spec">Sans · 12 · 400</div>
      </div>
      <div class="caption">最終更新 2026年4月</div>
    </div>
    <div class="row">
      <div class="meta">
        <div class="name">Label</div>
        <div class="spec">Sans · 12 · 500</div>
      </div>
      <div class="label" style="white-space: nowrap">時間 · 記録 · 計算</div>
    </div>
  </body>
</html>
