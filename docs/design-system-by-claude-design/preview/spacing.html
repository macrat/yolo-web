<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Spacing</title>
    <link rel="stylesheet" href="../colors_and_type.css?v=8" />
    <style>
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg-soft);
      }
      .row {
        display: grid;
        grid-template-columns: 80px 1fr 60px;
        gap: 12px;
        align-items: center;
        padding: 6px 0;
      }
      .label {
        font-family: var(--font-mono);
        font-size: 12px;
        color: var(--fg);
        white-space: nowrap;
      }
      .bar {
        background: var(--fg);
        height: 14px;
      }
      .px {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--fg-softer);
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <span class="label">--sp-1</span>
      <div class="bar" style="width: 4px"></div>
      <span class="px">4px</span>
    </div>
    <div class="row">
      <span class="label">--sp-2</span>
      <div class="bar" style="width: 8px"></div>
      <span class="px">8px</span>
    </div>
    <div class="row">
      <span class="label">--sp-3</span>
      <div class="bar" style="width: 12px"></div>
      <span class="px">12px</span>
    </div>
    <div class="row">
      <span class="label">--sp-4</span>
      <div class="bar" style="width: 16px"></div>
      <span class="px">16px</span>
    </div>
    <div class="row">
      <span class="label">--sp-5</span>
      <div class="bar" style="width: 24px"></div>
      <span class="px">24px</span>
    </div>
    <div class="row">
      <span class="label">--sp-6</span>
      <div class="bar" style="width: 32px"></div>
      <span class="px">32px</span>
    </div>
    <div class="row">
      <span class="label">--sp-7</span>
      <div class="bar" style="width: 48px"></div>
      <span class="px">48px</span>
    </div>
    <div class="row">
      <span class="label">--sp-8</span>
      <div class="bar" style="width: 64px"></div>
      <span class="px">64px</span>
    </div>
    <div class="row">
      <span class="label">--sp-9</span>
      <div class="bar" style="width: 96px"></div>
      <span class="px">96px</span>
    </div>
  </body>
</html>
