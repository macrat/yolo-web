<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Iconography</title>
    <link rel="stylesheet" href="../colors_and_type.css?v=8" />
    <style>
      body {
        margin: 0;
        padding: 32px;
        background: var(--bg-soft);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 14px;
      }
      .cell {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .cell svg {
        width: 22px;
        height: 22px;
        stroke: var(--fg);
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: square;
        stroke-linejoin: miter;
      }
      .name {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-softer);
      }
      .note {
        margin-top: 22px;
        font-size: 11px;
        color: var(--fg-softer);
        border-top: 1px solid var(--border);
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="cell">
        <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18" /></svg
        ><span class="name">menu</span>
      </div>
      <div class="cell">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" />
          <path d="m21 21-4.3-4.3" /></svg
        ><span class="name">search</span>
      </div>
      <div class="cell">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" /></svg
        ><span class="name">add</span>
      </div>
      <div class="cell">
        <svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" /></svg
        ><span class="name">back</span>
      </div>
      <div class="cell">
        <svg viewBox="0 0 24 24">
          <path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14" /></svg
        ><span class="name">trash</span>
      </div>
      <div class="cell">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3" />
          <circle cx="12" cy="12" r="9" /></svg
        ><span class="name">settings</span>
      </div>
      <div class="cell">
        <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" /></svg
        ><span class="name">check</span>
      </div>
      <div class="cell">
        <svg viewBox="0 0 24 24">
          <circle cx="9" cy="6" r="1" />
          <circle cx="15" cy="6" r="1" />
          <circle cx="9" cy="12" r="1" />
          <circle cx="15" cy="12" r="1" />
          <circle cx="9" cy="18" r="1" />
          <circle cx="15" cy="18" r="1" /></svg
        ><span class="name">grip</span>
      </div>
    </div>
    <p class="note">Lucide ベース · stroke 1.5px · square caps · 16/20/24 px</p>
  </body>
</html>
