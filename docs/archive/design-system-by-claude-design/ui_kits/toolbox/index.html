<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>道具箱 — yolos.net</title>
    <link rel="stylesheet" href="../_shared.css?v=6" />
    <style>
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        grid-auto-rows: minmax(180px, auto);
      }
      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      h1,
      h2,
      h3 {
        white-space: nowrap;
      }
      .caption {
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script type="text/babel" src="../_shared.jsx"></script>
    <script type="text/babel" src="./Toolbox.jsx"></script>

    <script type="text/babel">
      const { useState } = React;

      function App() {
        const [boxes, setBoxes] = useState([
          {
            id: "morning",
            name: "朝の道具",
            tools: [
              { id: "timer", w: 2, h: 1 },
              { id: "weather", w: 1, h: 1 },
              { id: "uranai", w: 1, h: 1 },
              { id: "memo", w: 2, h: 1 },
              { id: "habit", w: 2, h: 1 },
            ],
          },
          {
            id: "work",
            name: "仕事",
            tools: [
              { id: "timer", w: 1, h: 1 },
              { id: "memo", w: 2, h: 1 },
              { id: "calc", w: 1, h: 1 },
            ],
          },
          {
            id: "play",
            name: "息抜き",
            tools: [
              { id: "puzzle", w: 1, h: 1 },
              { id: "color", w: 2, h: 1 },
            ],
          },
        ]);
        const [active, setActive] = useState("morning");
        const [adding, setAdding] = useState(false);

        const cur = boxes.find((b) => b.id === active);

        const addBox = () => {
          const id = "box-" + Date.now();
          setBoxes((bs) => [...bs, { id, name: "新しい道具箱", tools: [] }]);
          setActive(id);
        };
        const addTool = (toolId) => {
          setBoxes((bs) =>
            bs.map((b) =>
              b.id === active
                ? { ...b, tools: [...b.tools, { id: toolId, w: 1, h: 1 }] }
                : b,
            ),
          );
          setAdding(false);
        };

        return (
          <div className="yolos-app">
            <Header active="box" />
            <main className="yo-page">
              <ToolboxTabs
                boxes={boxes}
                active={active}
                onSwitch={setActive}
                onAddBox={addBox}
              />

              <div className="grid">
                {cur.tools.map((t, i) => {
                  const tool = TOOL_LIBRARY.find((x) => x.id === t.id);
                  if (!tool) return null;
                  return (
                    <ToolPanel
                      key={i}
                      tool={tool}
                      w={t.w}
                      h={t.h}
                      onOpen={() => {}}
                      onMenu={() => {}}
                    />
                  );
                })}
                <AddPanel onAdd={() => setAdding(true)} />
              </div>
            </main>
            <Footer />
            <AddToolModal
              open={adding}
              onClose={() => setAdding(false)}
              onPick={addTool}
              current={cur.tools.map((t) => t.id)}
            />
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
